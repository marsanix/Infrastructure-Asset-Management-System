services:
  # ─── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: iams_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - iams_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Port expose untuk development (DBeaver, pgAdmin, dll)
    ports:
      - "5432:5432"

  # ─── Redis (rate limiting & token blacklist) ──────────────
  redis:
    image: redis:7-alpine
    container_name: iams_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - iams_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Flask) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iams_backend
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iams_net
    # Tidak expose langsung ke host — lewat nginx
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Vue 3 + Vite) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iams_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - iams_net
    expose:
      - "80"

  # ─── Nginx (Reverse Proxy) ────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: iams_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"  # Uncomment untuk production dengan SSL cert
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro  # Uncomment untuk production
    depends_on:
      - backend
      - frontend
    networks:
      - iams_net

volumes:
  postgres_data:
  redis_data:

networks:
  iams_net:
    driver: bridge
