services:
  redis:
    image: redis:7-alpine
    container_name: iams_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "900", "1", "--save", "300", "10"]
    volumes:
      - redis_data:/data
    networks:
      - iams_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mariadb:10.11
    container_name: iams_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-iams_root_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-iams_db}
      MYSQL_USER: ${MYSQL_USER:-iams}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-iams_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/database.mysql.compat.sql:/docker-entrypoint-initdb.d/01_baseline.sql:ro
    networks:
      - iams_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iams_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://iams:iams_secret@mysql:3306/iams_db}
      JWT_SECRET: ${JWT_SECRET}
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://localhost}
      FLASK_ENV: ${FLASK_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-Lax}
      RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-true}
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-memory://}
    command: ["/app/entrypoint.sh"]
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    networks:
      - iams_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/auth/csrf-token')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: iams_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - iams_network
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 256m
    mem_reservation: 128m

  nginx:
    image: nginx:alpine
    container_name: iams_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/iams.crt:/etc/nginx/certs/iams.crt:ro
      - ./nginx/iams.key:/etc/nginx/certs/iams.key:ro
    networks:
      - iams_network
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  redis_data:

networks:
  iams_network:
    driver: bridge
