# IAMS Production Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/iams.example.com/fullchain.pem:/etc/nginx/certs/iams.crt:ro
      - /etc/letsencrypt/live/iams.example.com/privkey.pem:/etc/nginx/certs/iams.key:ro
    environment:
      - DOMAIN=iams.example.com

  backend:
    environment:
      FLASK_ENV: production
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: Strict
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
      FRONTEND_ORIGIN: https://iams.example.com
    volumes:
      - ./backend:/app
      - backend_logs:/var/log/gunicorn

volumes:
  backend_logs:
