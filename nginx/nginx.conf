worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting zones (OWASP A07)
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    upstream backend  { server backend:5000; }
    upstream frontend { server frontend:80; }

    # ── HTTP server (development) ─────────────────────────────
    # Untuk production: aktifkan blok HTTPS di bawah dan nonaktifkan ini
    server {
        listen 80;
        server_name _;

        # Security headers (OWASP A05)
        add_header X-Frame-Options        "DENY"                            always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

        # Rate limit login lebih ketat
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API routes
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_hide_header  X-Powered-By;
        }

        # Frontend (SPA)
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }

    # ── HTTPS server (production) ─────────────────────────────
    # Uncomment blok ini dan comment blok HTTP di atas untuk production.
    # Pastikan cert.pem dan key.pem sudah ada di nginx/certs/
    #
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     ... (sama seperti blok HTTP di atas)
    # }
}
